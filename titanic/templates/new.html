<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>新增乘客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        select {
            padding: 6px;
            width: 300px;
        }

        button {
            margin-top: 20px;
            padding: 8px 16px;
        }
    </style>
</head>

<body>
    <h1>新增乘客</h1>

    <form id="passengerForm">
        <label>Survived</label>
        <select name="Survived" required>
            <option value="0">0：未生還</option>
            <option value="1">1：生還</option>
        </select>

        <label>Pclass</label>
        <select name="Pclass" required>
            <option value="1">1 等艙</option>
            <option value="2">2 等艙</option>
            <option value="3">3 等艙</option>
        </select>

        <label>Name</label>
        <input name="Name" required>

        <label>Sex</label>
        <select name="Sex" required>
            <option value="male">male</option>
            <option value="female">female</option>
        </select>

        <label>Age</label>
        <input name="Age" type="number" step="0.01">

        <label>SibSp</label>
        <input name="SibSp" type="number" min="0" value="0" required>

        <label>Parch</label>
        <input name="Parch" type="number" min="0" value="0" required>

        <label>Ticket</label>
        <input name="Ticket" required>

        <label>Fare</label>
        <input name="Fare" type="number" step="0.0001" min="0" value="0" required>

        <label>Cabin</label>
        <input name="Cabin">

        <label>Embarked</label>
        <select name="Embarked">
            <option value="">未知</option>
            <option value="C">C</option>
            <option value="Q">Q</option>
            <option value="S">S</option>
        </select>

        <button type="submit">新增</button>
        <a href="/">回首頁</a>
    </form>

    <script>
        // 監聽submit, 這裡利用callback
        document.getElementById("passengerForm").addEventListener('submit', async function (event) {
            event.preventDefault();
            /*
            為什麼這裡一定要加？因為你的程式碼中使用了 async function (event)，這代表後續會執行 async/await 的非同步操作（例如：使用 fetch 或 axios 把乘客資料傳送到後端 API）。如果沒有加上 event.preventDefault();，會發生以下狀況：使用者點擊送出。JavaScript 開始執行非同步傳送，但還沒等傳送完成。瀏覽器就因為預設行為直接重整了網頁。網頁一重整，原本正在執行的 JavaScript 程式碼就會被中斷，導致資料根本沒有成功傳送到後端。

            <核心目的> 阻止頁面跳轉或重整：傳統的 HTML <form> 表單在點擊「提交」按鈕時，瀏覽器會自動將頁面導向 action 屬性指定的網址，或是直接重新整理當前頁面。保留網頁狀態：在前後端分離或使用 AJAX/Fetch API 的現代網頁中，我們通常希望用 JavaScript 異步處理資料，而不希望頁面重新整理導致原本輸入的資料或畫面狀態消失。
            */

            const form = event.target;
            const formData = new FormData(form);

            const data = Object.fromEntries(formData.entries());

            //console.log(data);

            const response = await fetch('/api/passengers', {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (!response.ok) {
                alert(result.error);
                return;
            }

            alert('新增成功')

            //這裡是回到首頁的意思, 因為最初的路徑是http://... / 
            window.location.href = "/";
        })

    </script>
</body>

</html>
